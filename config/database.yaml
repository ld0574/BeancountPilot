# Database configuration file

# Database type
database_type: sqlite

# SQLite configuration
sqlite:
  # Database file path (supports environment variables)
  path: ${BEANCOUNTPILOT_DB_PATH:-~/.beancountpilot/data/beancountpilot.db}
  
  # Enable WAL mode (improves concurrent performance)
  enable_wal: true
  
  # Connection pool configuration
  pool_size: 5
  max_overflow: 10
  pool_timeout: 30
  pool_recycle: 3600

# PostgreSQL configuration (optional, for future expansion)
postgresql:
  host: ${POSTGRES_HOST:-localhost}
  port: ${POSTGRES_PORT:-5432}
  database: ${POSTGRES_DB:-beancountpilot}
  user: ${POSTGRES_USER:-beancountpilot}
  password: ${POSTGRES_PASSWORD:-}
  pool_size: 5
  max_overflow: 10
  pool_timeout: 30
  pool_recycle: 3600

# Database migration configuration
migration:
  # Auto execute migrations
  auto_migrate: true
  
  # Migration scripts directory
  migrations_dir: migrations
